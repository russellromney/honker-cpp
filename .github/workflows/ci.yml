name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout main honker
        uses: actions/checkout@v4
        with:
          repository: russellromney/honker
          path: main

      - name: Prep submodule path
        run: rm -rf main/packages/honker-cpp

      - name: Checkout honker-cpp PR
        uses: actions/checkout@v4
        with:
          path: main/packages/honker-cpp

      - name: Install Zig
        shell: bash
        run: |
          set -euo pipefail
          case "${RUNNER_OS}" in
            Linux)
              url="https://ziglang.org/download/0.15.1/zig-x86_64-linux-0.15.1.tar.xz"
              dir="zig-x86_64-linux-0.15.1"
              ;;
            macOS)
              url="https://ziglang.org/download/0.15.1/zig-aarch64-macos-0.15.1.tar.xz"
              dir="zig-aarch64-macos-0.15.1"
              ;;
            *)
              echo "unsupported runner: ${RUNNER_OS}" >&2
              exit 1
              ;;
          esac
          curl -L "$url" -o zig.tar.xz
          tar -xf zig.tar.xz
          echo "$PWD/$dir" >> "$GITHUB_PATH"

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: main

      - name: Build honker extension
        working-directory: main
        run: cargo build --release -p honker-extension

      - name: Set extension path (Linux)
        if: runner.os == 'Linux'
        run: echo "EXT_PATH=$PWD/main/target/release/libhonker_ext.so" >> $GITHUB_ENV

      - name: Set extension path (macOS)
        if: runner.os == 'macOS'
        run: echo "EXT_PATH=$PWD/main/target/release/libhonker_ext.dylib" >> $GITHUB_ENV

      - name: Run tests
        working-directory: main/packages/honker-cpp
        run: zig build test -Dhonker-ext=${{ env.EXT_PATH }}
